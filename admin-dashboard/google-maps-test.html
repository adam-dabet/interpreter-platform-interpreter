<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Maps API Test</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .status { padding: 10px; margin: 10px 0; border-radius: 5px; }
        .success { background-color: #d4edda; color: #155724; }
        .error { background-color: #f8d7da; color: #721c24; }
        .loading { background-color: #fff3cd; color: #856404; }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; }
    </style>
</head>
<body>
    <h1>Google Maps API Test</h1>
    
    <div id="status" class="status loading">Testing Google Maps API...</div>
    
    <div id="test-section" style="display: none;">
        <h2>Location Search Test</h2>
        <input 
            type="text" 
            id="location-input" 
            placeholder="Type a location (e.g., Walmart, San Francisco, Golden Gate Bridge)"
        >
        <div id="results"></div>
    </div>

    <script>
        const API_KEY = 'AIzaSyA4DAq8c1FLhGnq3rGs4akYx_9SnvzmbTU';
        const statusDiv = document.getElementById('status');
        const testSection = document.getElementById('test-section');
        const locationInput = document.getElementById('location-input');
        const resultsDiv = document.getElementById('results');

        function updateStatus(message, type) {
            statusDiv.textContent = message;
            statusDiv.className = `status ${type}`;
        }

        function testGoogleMapsAPI() {
            updateStatus('Loading Google Maps API...', 'loading');
            
            // Test basic API access first
            fetch(`https://maps.googleapis.com/maps/api/geocode/json?address=test&key=${API_KEY}`)
                .then(response => response.json())
                .then(data => {
                    if (data.status === 'REQUEST_DENIED') {
                        updateStatus(`API Error: ${data.error_message}`, 'error');
                        return;
                    }
                    
                    updateStatus('Google Maps API is accessible!', 'success');
                    testSection.style.display = 'block';
                    setupAutocomplete();
                })
                .catch(error => {
                    updateStatus(`Network Error: ${error.message}`, 'error');
                });
        }

        function setupAutocomplete() {
            // Load Google Maps script
            const script = document.createElement('script');
            script.src = `https://maps.googleapis.com/maps/api/js?key=${API_KEY}&libraries=places&callback=initAutocomplete`;
            script.async = true;
            script.defer = true;
            
            window.initAutocomplete = () => {
                try {
                    const autocomplete = new google.maps.places.Autocomplete(locationInput, {
                        types: ['geocode', 'establishment', 'point_of_interest'],
                        componentRestrictions: { country: 'us' }
                    });
                    
                    autocomplete.addListener('place_changed', () => {
                        const place = autocomplete.getPlace();
                        if (place.geometry) {
                            resultsDiv.innerHTML = `
                                <h3>Selected Location:</h3>
                                <p><strong>Name:</strong> ${place.name || 'N/A'}</p>
                                <p><strong>Address:</strong> ${place.formatted_address || 'N/A'}</p>
                                <p><strong>Types:</strong> ${place.types ? place.types.join(', ') : 'N/A'}</p>
                                <p><strong>Coordinates:</strong> ${place.geometry.location.lat()}, ${place.geometry.location.lng()}</p>
                            `;
                        } else {
                            resultsDiv.innerHTML = '<p>No location details available</p>';
                        }
                    });
                    
                    updateStatus('✅ Google Maps Autocomplete is working! Try typing a location above.', 'success');
                } catch (error) {
                    updateStatus(`Autocomplete Error: ${error.message}`, 'error');
                }
            };
            
            script.onerror = () => {
                updateStatus('Failed to load Google Maps script', 'error');
            };
            
            document.head.appendChild(script);
        }

        // Start the test
        testGoogleMapsAPI();
    </script>
</body>
</html>
